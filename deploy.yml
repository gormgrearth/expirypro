name: Deploy ExpiryPro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Vérification syntaxe ──────────────────────────────────────────
  lint:
    name: Lint & Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (functions)
        run: |
          cd functions
          npm ci

      - name: Check JS syntax (functions)
        run: node --check functions/index.js

      - name: Validate HTML
        run: |
          npx --yes html-validate \
            --config '{"extends":["html-validate:recommended"],"rules":{"no-inline-style":"off","require-sri":"off"}}' \
            public/app.html public/index.html || true

  # ── Job 2 : Build & Deploy ────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Inject Firebase config
        # Génère public/firebase-config.js avec les secrets GitHub
        run: |
          cat > public/firebase-config.js << 'JSEOF'
          const FIREBASE_CONFIG = {
            apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
            authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId:             "${{ secrets.FIREBASE_APP_ID }}"
          };
          JSEOF

      - name: Install Functions dependencies
        run: |
          cd functions
          npm ci

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}

      - name: Deployment summary
        run: |
          echo "✅ Deployed to https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
